<!-- Generated by GitHub Copilot -->
<div class="palette" role="navigation" aria-label="Question navigation palette">
  <h3>Questions</h3>
  <div class="grid">
    @for (q of [].constructor(totalQuestions); track $index) {
    <button [class]="'cell ' + getState($index)" (click)="goTo($index)"
      [attr.aria-label]="'Go to question ' + ($index + 1)"
      [attr.aria-current]="$index === currentIndex ? 'true' : null">
      {{ $index + 1 }}
    </button>
    }
  </div>
  <div class="legend">
    <span class="legend-item"><span class="dot current"></span> Current</span>
    <span class="legend-item"><span class="dot answered"></span> Answered</span>
    <span class="legend-item"><span class="dot review"></span> Review</span>
    <span class="legend-item"><span class="dot unanswered"></span> Unanswered</span>
  </div>
</div>
