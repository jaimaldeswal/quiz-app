<!-- Generated by GitHub Copilot -->
<div class="exam-page">
  <!-- Timer bar -->
  <header class="timer-bar" role="timer" aria-live="polite" aria-label="Exam countdown timer">
    <span class="timer-label">Time Remaining</span>
    <span class="timer-value" [class.warning]="(quizService.remainingSeconds$ | async)! < 300">
      {{ formatTime((quizService.remainingSeconds$ | async)!) }}
    </span>
  </header>

  <div class="exam-body">
    <!-- Main question area -->
    <main class="question-area">
      @if (currentQuestion) {
        <div class="question-header">
          <span class="question-number">Question {{ currentIndex + 1 }} of {{ totalQuestions }}</span>
        </div>

        <p class="question-text">{{ currentQuestion.text }}</p>

        <fieldset class="options" role="radiogroup" [attr.aria-label]="'Options for question ' + (currentIndex + 1)">
          <legend class="sr-only">Select your answer</legend>
          @for (opt of currentQuestion.options; track $index) {
            <label
              class="option-label"
              [class.selected]="selectedOption === optionLetter($index)"
            >
              <input
                type="radio"
                [name]="'question-' + currentQuestion.id"
                [value]="optionLetter($index)"
                [checked]="selectedOption === optionLetter($index)"
                (change)="selectOption(optionLetter($index))"
                [attr.aria-label]="optionLetter($index) + ': ' + opt"
              />
              <span class="option-letter">{{ optionLetter($index) }}</span>
              <span class="option-text">{{ opt }}</span>
            </label>
          }
        </fieldset>

        <div class="nav-buttons">
          <button
            class="btn secondary"
            (click)="previous()"
            [disabled]="currentIndex === 0"
            aria-label="Go to previous question"
          >
            &larr; Previous
          </button>
          <button
            class="btn secondary"
            (click)="next()"
            [disabled]="currentIndex === totalQuestions - 1"
            aria-label="Go to next question"
          >
            Next &rarr;
          </button>
        </div>

        <div class="submit-area">
          <button class="btn primary" (click)="submitExam()">Submit Exam</button>
        </div>
      }
    </main>

    <!-- Sidebar palette -->
    <aside class="sidebar">
      <app-question-palette
        [totalQuestions]="totalQuestions"
        [currentIndex]="currentIndex"
        [answeredSet]="answeredSet"
        (navigate)="goToQuestion($event)"
      ></app-question-palette>
    </aside>
  </div>
</div>
