<!-- Generated by GitHub Copilot -->
<div class="result-page">
  <h1>Exam Results</h1>

  <div class="score-circle" role="img" [attr.aria-label]="'Score: ' + result.score + ' percent'">
    <span class="score-value">{{ result.score }}%</span>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-number">{{ result.total }}</span>
      <span class="stat-label">Total Questions</span>
    </div>
    <div class="stat-card">
      <span class="stat-number">{{ result.attempted }}</span>
      <span class="stat-label">Attempted</span>
    </div>
    <div class="stat-card correct">
      <span class="stat-number">{{ result.correct }}</span>
      <span class="stat-label">Correct</span>
    </div>
    <div class="stat-card wrong">
      <span class="stat-number">{{ result.wrong }}</span>
      <span class="stat-label">Wrong</span>
    </div>
  </div>

  <div class="action-buttons">
    <button class="btn secondary" (click)="reviewAnswers()">Review Answers</button>
    <button class="btn primary" (click)="retakeQuiz()">Take Another Quiz</button>
  </div>
</div>
