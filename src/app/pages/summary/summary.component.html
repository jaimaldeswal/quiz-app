<!-- Generated by GitHub Copilot -->
<div class="summary-page">
  <h1>Exam Summary</h1>

  <div class="info-card">
    <div class="info-row">
      <span class="label">Total Questions</span>
      <span class="value">{{ totalQuestions }}</span>
    </div>
    <div class="info-row">
      <span class="label">Duration</span>
      <span class="value">{{ examDuration }} minutes (1.5 hours)</span>
    </div>
  </div>

  <p class="instructions">
    Once you start, the timer will begin counting down. You can navigate between
    questions and change your answers at any time. The exam auto-submits when time expires.
  </p>

  <button class="btn primary" (click)="startPaper()">Start Paper</button>
</div>
